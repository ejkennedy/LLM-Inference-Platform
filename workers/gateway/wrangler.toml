name = "llm-gateway"
main = "dist/index.js"
compatibility_date = "2025-12-01"

[build]
command = "npm run build"

[ai]
binding = "AI"

[[durable_objects]]
name = "RATE_LIMITER"
class_name = "RateLimiter"
binding = "RATE_LIMITER"

[[services]]
binding = "ROUTER"
service = "llm-router"

[[services]]
binding = "OBSERVABILITY"
service = "llm-observability"
