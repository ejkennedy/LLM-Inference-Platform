name = "llm-observability"
main = "dist/index.js"
compatibility_date = "2025-12-01"

[build]
command = "npm run build"

[vars]
ANALYTICS_DATASET = "llm_requests"
ANALYTICS_ACCOUNT_ID = "f8cd483b056259da8aeb8817b2135da4"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "llm_requests"

[env.staging]
name = "llm-observability-staging"

[env.staging.vars]
ANALYTICS_DATASET = "llm_requests"
ANALYTICS_ACCOUNT_ID = "f8cd483b056259da8aeb8817b2135da4"

[[env.staging.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "llm_requests"

[env.production]
name = "llm-observability"

[env.production.vars]
ANALYTICS_DATASET = "llm_requests"
ANALYTICS_ACCOUNT_ID = "f8cd483b056259da8aeb8817b2135da4"

[[env.production.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "llm_requests"
