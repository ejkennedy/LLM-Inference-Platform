name: Deploy

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build workspaces
        run: npm run build

  deploy-staging:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    needs: verify
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      matrix:
        worker:
          - router
          - observability
          - gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy worker to staging
        run: npx wrangler deploy --config workers/${{ matrix.worker }}/wrangler.toml --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

  smoke-staging:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Smoke check gateway health
        run: curl --fail --silent --show-error "${{ vars.STAGING_GATEWAY_URL }}/health"

  deploy-production:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        worker:
          - router
          - observability
          - gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy worker to production
        run: npx wrangler deploy --config workers/${{ matrix.worker }}/wrangler.toml --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

  smoke-production:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    needs: deploy-production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Smoke check gateway health
        run: curl --fail --silent --show-error "${{ vars.PRODUCTION_GATEWAY_URL }}/health"
